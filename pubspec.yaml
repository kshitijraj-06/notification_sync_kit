name: notification_sync_kit
description: >-
  Capture Android notifications, persist them to a local queue, and sync them
  to your server via HTTP with Bearer token auth and automatic retry.
  Enriches each notification with GPS speed, location, and driver interaction
  type (OPENED, DISMISSED, REPLIED, IGNORED) for driver behaviour analysis.
version: 0.2.0
homepage: https://github.com/kshitijranjan/notification_sync_kit
repository: https://github.com/kshitijranjan/notification_sync_kit
issue_tracker: https://github.com/kshitijranjan/notification_sync_kit/issues

topics:
  - notifications
  - android
  - background-service
  - http
  - sync
  - gps
  - driver-behaviour

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.0
  http: ^1.2.2
  logging: ^1.2.0
  notification_listener_service: ^0.3.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
